  .subtitle{animation:heroIn .8s ease both;animation-delay:.18s;margin-top:14px;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#eaad55;font-weight:600;}
  .motto{animation:heroIn .8s ease both;animation-delay:.26s;max-width:330px;margin:22px auto 0;font-family:'DM Serif Display',serif;font-style:italic;font-size:17px;line-height:1.5;color:#e6d5bc;min-height:1px;}

  .searchbtn.on{border:1px solid #2a1b12;background:#2a1b12;color:#f6ead3;}
  .searchwrap{padding:0 12px 10px;}
  .searchbox{display:flex;align-items:center;gap:8px;background:#fffdf8;border:1px solid #e2d6bf;border-radius:12px;padding:9px 13px;}
  .searchbox span{color:#b0a086;font-size:12.5px;font-weight:600;}
  .searchbox input{flex:1;border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:15px;color:#33261c;}
  .clearbtn{border:none;background:transparent;color:#b0472a;font-size:13px;cursor:pointer;font-weight:600;}

  section.sec{padding:26px 16px 8px;}
  .sechead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .sechead h2{font-family:'DM Serif Display',serif;font-size:26px;color:#33261c;margin:0;letter-spacing:.2px;}
  .sechead .sub{font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;color:#c0892f;}
  .cards{display:flex;flex-direction:column;gap:10px;}

  .arow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #efe6d4;}
  .acode{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:1.5px solid #c1502e;color:#c1502e;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;letter-spacing:.3px;}
  .aname{font-size:14.5px;color:#33261c;font-weight:500;}
  .frozennote{margin-top:16px;display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:#b07a1f;background:#fdf3df;border:1px solid #f0e0bf;border-radius:11px;padding:11px 13px;line-height:1.5;}

  .sheetnote{margin:16px 2px 0;font-size:11.5px;color:#9b8a73;line-height:1.6;}

</style>

    b.setAttribute('data-lang',lg);
    b.textContent=LANGLABEL[lg];
    b.onclick=function(){ setLang(lg); };
    langbar.appendChild(b);
  });
  function paintLang(){
    Array.prototype.forEach.call(langbar.children,function(b){
      b.className='langbtn'+(b.getAttribute('data-lang')===state.lang?' on':'');
    });
  }
  function setLang(lg){
    if(DEMO_MODE && lg!=="it"){ openLangInfo(); return; }
    if(lg===state.lang) return;
    state.lang=lg; document.documentElement.setAttribute('lang',lg);
    closeSheet(); paintLang(); applyStatic(); buildTabs(); render();
  }

  // ---- static texts (header/footer/fab) ----
  function applyStatic(){
    document.getElementById('motto').innerHTML=esc(mottoText()).replace(/\n/g,'<br>');
    document.getElementById('fablabel').textContent=ui('allergens');
    var coperto=siteTxt('coperto')||((D.restaurant&&D.restaurant.coperto!=null)?D.restaurant.coperto:2);
    document.getElementById('f-coperto').textContent=ui('coperto').replace('%s',String(coperto).replace('.',','));
    document.getElementById('f-frozen').textContent=(state.lang==='it'&&siteTxt('frozenLegend'))?siteTxt('frozenLegend'):ui('frozenLegend');
    document.getElementById('f-note').textContent=(state.lang==='it'&&siteTxt('footerNote'))?siteTxt('footerNote'):ui('note');
  }

  // ---- tabs ----
  var tabrow=document.getElementById('tabrow');
  function buildTabs(){
    tabrow.innerHTML='';
    (D.sections||[]).forEach(function(sec){
      var b=document.createElement('button');
      b.className='tab'+(sec.id===state.activeCat?' active':'');
      b.setAttribute('data-tab',sec.id);
      b.textContent=tabLabel(sec);
      b.onclick=function(){ gotoCat(sec.id); };
      tabrow.appendChild(b);
    });
  }
  function paintTabs(){ Array.prototype.forEach.call(tabrow.children,function(b){ b.className='tab'+(b.getAttribute('data-tab')===state.activeCat?' active':''); }); }
  function ensureTab(id){ var b=tabrow.querySelector('[data-tab="'+id+'"]'); if(b) tabrow.scrollTo({left:Math.max(0,b.offsetLeft-16),behavior:'smooth'}); }
  function gotoCat(id){
    var el=document.getElementById('sec-'+id); if(!el) return;
    var bar=document.getElementById('stickybar'); var off=(bar?bar.offsetHeight:60)+10;
    var y=el.getBoundingClientRect().top+window.scrollY-off;
    window.scrollTo({top:y,behavior:'smooth'});
    state.activeCat=id; paintTabs(); ensureTab(id);
  }

  // ---- render sections ----
  var main=document.getElementById('main');
  function render(){
    main.innerHTML=''; var gi=0;
    (D.sections||[]).forEach(function(sec){
      var items=sec.items||[];
      var sc=document.createElement('section');
      sc.className='sec'; sc.id='sec-'+sec.id; sc.setAttribute('data-sec',sec.id);
      var subt=catSub(sec);
      var head='<div class="sechead"><h2>'+esc(catTitle(sec))+'</h2>'+(subt?'<span class="sub">'+esc(subt)+'</span>':'')+'</div>';
      var cards='<div class="cards">';
      items.forEach(function(it){
        var has=(it.keys||[]).length>0;
        var delay=Math.min(gi*35,520); gi++;
        var desc=t(it.desc);
        cards+='<article class="card" style="animation-delay:'+delay+'ms">'
          +'<div class="row"><div style="flex:1;min-width:0;">'
          +'<h3>'+esc(it.name)+(it.frozen?'<span class="frozen"> *</span>':'')+'</h3>'
          +(desc?'<p>'+esc(desc)+'</p>':'')
          +'<button class="pill'+(has?'':' none')+'" data-dish="'+esc(sec.id)+'|'+esc(it.name)+'"><span class="dot"></span>'+(has?ui('allergens'):ui('noAllergens'))+'</button>'
          +'</div><div class="price">'+esc(it.price)+'</div></div></article>';
      });
      cards+='</div>';
      sc.innerHTML=head+cards; main.appendChild(sc);
    });
    Array.prototype.forEach.call(main.querySelectorAll('[data-dish]'),function(btn){
      btn.onclick=function(){
        var p=btn.getAttribute('data-dish').split('|');
        var sec=(D.sections||[]).filter(function(s){return s.id===p[0];})[0];
        var it=(sec.items||[]).filter(function(x){return x.name===p[1];})[0];
        openDish(it);
      };
    });
  }

  // ---- scroll spy ----
  var raf=null;
  window.addEventListener('scroll',function(){
    if(raf) return;
    raf=requestAnimationFrame(function(){
      raf=null;
      var bar=document.getElementById('stickybar'); var off=(bar?bar.offsetHeight:60)+10;
      var secs=Array.prototype.slice.call(document.querySelectorAll('[data-sec]'));
      var cur=state.activeCat;
      secs.forEach(function(s){ if(s.getBoundingClientRect().top-off<=1) cur=s.getAttribute('data-sec'); });
      if(cur!==state.activeCat){ state.activeCat=cur; paintTabs(); ensureTab(cur); }
    });
  },{passive:true});

  // ---- bottom sheet ----
  var sheetRoot=document.getElementById('sheet-root');
  function closeSheet(){ sheetRoot.innerHTML=''; }
  function buildSheet(inner){
    sheetRoot.innerHTML='';
    var bd=document.createElement('div'); bd.className='backdrop'; bd.onclick=closeSheet;
    var sh=document.createElement('div'); sh.className='sheet'; sh.onclick=function(e){e.stopPropagation();};
    sh.innerHTML=inner; bd.appendChild(sh); sheetRoot.appendChild(bd);
    var cb=sh.querySelector('.closebtn'); if(cb) cb.onclick=closeSheet;
  }
  function openDish(it){
    var head='<div class="handle"></div><div class="sheethead"><div style="min-width:0;">'
      +'<h3>'+esc(it.name)+'</h3><p>'+esc(ui('dishSub'))+'</p></div><button class="closebtn">×</button></div>';
    var body;
    if((it.keys||[]).length===0){ body='<div class="emptybox">'+esc(ui('none'))+'</div>'; }
    else {
      body='<div style="display:grid;grid-template-columns:1fr;gap:0;margin-top:8px;">';
      it.keys.forEach(function(k){ body+='<div class="arow"><span class="acode">'+esc(allCode(k))+'</span><span class="aname">'+esc(allName(k))+'</span></div>'; });
      body+='</div>';
    }
    if(it.frozen){ body+='<div class="frozennote"><b>*</b><span>'+esc(ui('frozen'))+'</span></div>'; }
    buildSheet(head+body);
  }
  function openLegend(){
    var head='<div class="handle"></div><div class="sheethead"><div style="min-width:0;">'
      +'<h3>'+esc(ui('legendTitle'))+'</h3><p>'+esc(ui('legendSub'))+'</p></div><button class="closebtn">×</button></div>';
    var body='<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 18px;margin-top:8px;">';
    ORDER.forEach(function(k){ body+='<div class="arow"><span class="acode">'+esc(allCode(k))+'</span><span class="aname">'+esc(allName(k))+'</span></div>'; });
    var ln=(state.lang==='it'&&siteTxt('legendNote'))?siteTxt('legendNote'):ui('legendNote');
    body+='</div><p class="sheetnote">'+esc(ln)+'</p>';
    buildSheet(head+body);
  }
  function openLangInfo(){
    var head='<div class="handle"></div><div class="sheethead"><div style="min-width:0;">'
      +'<h3>Menù multilingua</h3><p>Funzione opzionale</p></div><button class="closebtn">×</button></div>';
    var body='<div style="margin-top:10px;font-size:14px;line-height:1.65;color:#5c4a38;">'
      +'La traduzione del menù in <b>inglese, tedesco, spagnolo e francese</b> è una funzione opzionale, attivabile su richiesta.'
      +'<br><br>In questa demo il menù è mostrato in italiano. Con l\'attivazione, l\'intero contenuto — descrizioni dei piatti comprese — viene tradotto automaticamente e resta sempre allineato al menù.'
      +'</div>'
      +'<div style="margin-top:16px;display:flex;gap:9px;flex-wrap:wrap;">'
      +'<span style="padding:5px 11px;border-radius:999px;background:#faeadf;border:1px solid #eecebc;color:#b0472a;font-size:12px;font-weight:600;">EN English</span>'
      +'<span style="padding:5px 11px;border-radius:999px;background:#faeadf;border:1px solid #eecebc;color:#b0472a;font-size:12px;font-weight:600;">DE Deutsch</span>'
      +'<span style="padding:5px 11px;border-radius:999px;background:#faeadf;border:1px solid #eecebc;color:#b0472a;font-size:12px;font-weight:600;">ES Español</span>'
      +'<span style="padding:5px 11px;border-radius:999px;background:#faeadf;border:1px solid #eecebc;color:#b0472a;font-size:12px;font-weight:600;">FR Français</span>'
      +'</div>';
    buildSheet(head+body);
  }
  document.getElementById('fab').onclick=openLegend;
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeSheet(); });

  // ---- go ----
  document.documentElement.setAttribute('lang',state.lang);
  applyStatic(); buildTabs(); render();
})();
</script>
</body>
</html>
